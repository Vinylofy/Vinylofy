name: Shop - Sounds Venlo Full

on:
  workflow_dispatch:
  schedule:
    - cron: "50 4 * * *"

concurrency:
  group: vinylofy-soundsvenlo
  cancel-in-progress: false

jobs:
  run:
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 90
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      SUPABASE_STORAGE_BUCKET: ${{ vars.SUPABASE_STORAGE_BUCKET }}
      VINYLOFY_SCRAPER_CMD_SOUNDSVENLO: xvfb-run -a python -u scripts/scrapers/soundsvenlo.py --mode both --limit-detail 250 --output-dir data/raw/soundsvenlo --headful

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Ensure Xvfb is available
        shell: bash
        run: |
          if command -v xvfb-run >/dev/null 2>&1; then
            exit 0
          fi

          if command -v sudo >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y xvfb
            exit 0
          fi

          echo "xvfb-run ontbreekt op deze self-hosted runner. Installeer xvfb of voeg sudo toe."
          exit 1

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4 requests pandas lxml "psycopg[binary]" python-dotenv supabase playwright
          python -m playwright install chromium

      - name: Create runtime folders
        shell: bash
        run: |
          mkdir -p data/raw/soundsvenlo
          mkdir -p output

      - name: Run pipeline
        shell: bash
        run: |
          python -u scripts/automation/run_vinylofy_pipeline.py \
            --shop soundsvenlo

      - name: Upload workflow artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: soundsvenlo-full-${{ github.run_id }}
          path: |
            data/raw/soundsvenlo/**/*.csv
            data/raw/soundsvenlo/*.csv
            output/**/*.json
            output/**/*.csv
          if-no-files-found: warn
