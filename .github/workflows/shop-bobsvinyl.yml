name: Shop - Bobsvinyl

on:
  workflow_dispatch:
    inputs:
      workers:
        description: "Aantal parallelle detail workers"
        required: false
        default: "5"
      limit_detail:
        description: "Max aantal detailpagina's per run (0 = alles, standaard 500)"
        required: false
        default: "500"
      delay_seconds:
        description: "Pauze tussen listingpagina's"
        required: false
        default: "0.20"
  schedule:
    - cron: "40 1 * * *"

permissions:
  contents: read
  actions: read

concurrency:
  group: vinylofy-bobsvinyl
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      SUPABASE_STORAGE_BUCKET: ${{ vars.SUPABASE_STORAGE_BUCKET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-scrapers.txt ]; then pip install -r requirements-scrapers.txt; fi
          pip install beautifulsoup4 requests pandas "psycopg[binary]" python-dotenv supabase

      - name: Create runtime folders
        shell: bash
        run: |
          mkdir -p data/raw/bobsvinyl
          mkdir -p output

      - name: Restore latest Bob artifact and state
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          WORKFLOW_NAME="Shop - Bobsvinyl"
          ARTIFACT_PREFIX="bobsvinyl-state-"
          TARGET_DIR="data/raw/bobsvinyl"

          echo "Zoek laatste succesvolle Bob-run..."
          RUN_JSON="$(gh run list --repo "$REPO" --workflow "$WORKFLOW_NAME" --status completed --json databaseId,conclusion -L 20 || echo '[]')"
          export RUN_JSON
          RUN_ID="$(python -c "import json, os; runs = json.loads(os.environ.get('RUN_JSON', '[]') or '[]'); print(next((str(r['databaseId']) for r in runs if r.get('conclusion') == 'success'), ''))")"

          if [ -z "$RUN_ID" ]; then
            echo "Geen eerdere succesvolle Bob-run gevonden; ga door met lege state."
            exit 0
          fi

          echo "Gebruik run id: $RUN_ID"
          ARTIFACTS_JSON="$(gh api "repos/$REPO/actions/runs/$RUN_ID/artifacts" || echo '{}')"
          export ARTIFACTS_JSON ARTIFACT_PREFIX
          ARTIFACT_NAME="$(python -c "import json, os; artifacts = json.loads(os.environ.get('ARTIFACTS_JSON', '{}') or '{}').get('artifacts', []); prefix = os.environ.get('ARTIFACT_PREFIX', ''); print(next((a['name'] for a in artifacts if a.get('name', '').startswith(prefix)), ''))")"

          if [ -z "$ARTIFACT_NAME" ]; then
            echo "Geen Bob-artifact gevonden; ga door zonder restore."
            exit 0
          fi

          echo "Download artifact: $ARTIFACT_NAME"
          rm -rf "$TARGET_DIR/_restore"
          mkdir -p "$TARGET_DIR/_restore"
          gh run download "$RUN_ID" --repo "$REPO" -n "$ARTIFACT_NAME" -D "$TARGET_DIR/_restore"

          echo "Herstel CSV en JSON state"
          find "$TARGET_DIR/_restore" -type f \( -name '*.csv' -o -name '*.json' \) -exec cp -f {} "$TARGET_DIR/" \;
          ls -la "$TARGET_DIR"

      - name: Run Bob pipeline
        shell: bash
        run: |
          set -euo pipefail
          WORKERS="${{ github.event.inputs.workers }}"
          LIMIT_DETAIL="${{ github.event.inputs.limit_detail }}"
          DELAY_SECONDS="${{ github.event.inputs.delay_seconds }}"

          [ -n "$WORKERS" ] || WORKERS="5"
          [ -n "$LIMIT_DETAIL" ] || LIMIT_DETAIL="500"
          [ -n "$DELAY_SECONDS" ] || DELAY_SECONDS="0.20"

          export VINYLOFY_SCRAPER_CMD_BOBSVINYL="python -u scripts/scrapers/bobsvinyl.py --mode both --workers ${WORKERS} --limit-detail ${LIMIT_DETAIL} --delay-seconds ${DELAY_SECONDS} --state-file data/raw/bobsvinyl/bobsvinyl_detail_rotation_state.json --output-dir data/raw/bobsvinyl"
          echo "VINYLOFY_SCRAPER_CMD_BOBSVINYL=$VINYLOFY_SCRAPER_CMD_BOBSVINYL"
          python -u scripts/automation/run_vinylofy_pipeline.py --shop bobsvinyl

      - name: Upload Bob artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: bobsvinyl-state-${{ github.run_id }}
          path: |
            data/raw/bobsvinyl/*.csv
            data/raw/bobsvinyl/*.json
            output/**/*.json
            output/**/*.csv
          if-no-files-found: warn