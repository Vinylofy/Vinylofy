name: Shop - Platomania Step 1

on:
  workflow_dispatch:
  schedule:
    - cron: "10 1 * * *"
    - cron: "10 9 * * *"
    - cron: "10 17 * * *"

concurrency:
  group: vinylofy-platomania
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-scrapers.txt ]; then pip install -r requirements-scrapers.txt; fi
          pip install beautifulsoup4 requests pandas python-dotenv

      - name: Create runtime folders
        shell: bash
        run: |
          mkdir -p data/raw/platomania
          mkdir -p output

      - name: Run Platomania step 1
        shell: bash
        run: |
          python -u scripts/scrapers/platomania.py             --mode step1             --output-dir data/raw/platomania

      - name: Upload workflow artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: platomania-step1-${{ github.run_id }}
          path: |
            data/raw/platomania/**/*.csv
            data/raw/platomania/*.csv
            output/**/*.json
            output/**/*.csv
          if-no-files-found: warn
