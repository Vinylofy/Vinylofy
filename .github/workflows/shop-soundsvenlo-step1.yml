name: Shop - Sounds Venlo Step 1

on:
  workflow_dispatch:
  schedule:
    - cron: "50 1 * * *"
    - cron: "50 9 * * *"
    - cron: "50 17 * * *"

concurrency:
  group: vinylofy-soundsvenlo
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      SUPABASE_STORAGE_BUCKET: ${{ vars.SUPABASE_STORAGE_BUCKET }}
      VINYLOFY_SCRAPER_CMD_SOUNDSVENLO: python -u scripts/scrapers/soundsvenlo.py --mode step1 --output-dir data/raw/soundsvenlo

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4 requests pandas lxml "psycopg[binary]" python-dotenv supabase playwright
          python -m playwright install --with-deps chromium

      - name: Create runtime folders
        shell: bash
        run: |
          mkdir -p data/raw/soundsvenlo
          mkdir -p output

      - name: Run pipeline
        shell: bash
        run: |
          python -u scripts/automation/run_vinylofy_pipeline.py \
            --shop soundsvenlo \
            --skip-import \
            --skip-upload

      - name: Upload workflow artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: soundsvenlo-step1-${{ github.run_id }}
          path: |
            data/raw/soundsvenlo/**/*.csv
            data/raw/soundsvenlo/*.csv
            output/**/*.json
            output/**/*.csv
          if-no-files-found: warn
