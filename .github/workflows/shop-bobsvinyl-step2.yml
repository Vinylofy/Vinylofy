name: Shop - Bobsvinyl Step 2

on:
  workflow_dispatch:
  schedule:
    - cron: "40 3 * * *"

permissions:
  contents: read
  actions: read

concurrency:
  group: vinylofy-bobsvinyl
  cancel-in-progress: false

jobs:

  gate:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.decide.outputs.should_run }}
    steps:
      - id: decide
        name: Decide whether enrich should run
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          DAY_INDEX=$(( $(date -u +%s) / 86400 ))
          if [ $(( DAY_INDEX % 2 )) -eq 0 ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

  run:
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      SUPABASE_STORAGE_BUCKET: ${{ vars.SUPABASE_STORAGE_BUCKET }}
      VINYLOFY_SCRAPER_CMD_BOBSVINYL: "python -u scripts/scrapers/bobsvinyl.py --mode step2 --workers 5 --limit-detail 250 --output-dir data/raw/bobsvinyl"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-scrapers.txt ]; then pip install -r requirements-scrapers.txt; fi
          pip install beautifulsoup4 requests pandas "psycopg[binary]" python-dotenv supabase

      - name: Create runtime folders
        shell: bash
        run: |
          mkdir -p data/raw/bobsvinyl
          mkdir -p output

      - name: Restore latest source artifact
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          WORKFLOW_NAME="Shop - Bobsvinyl Step 1"
          ARTIFACT_PREFIX="bobsvinyl-step1-"
          TARGET_DIR="data/raw/bobsvinyl"
          echo "Zoek laatste succesvolle run van: $WORKFLOW_NAME"
          RUN_JSON="$(gh run list --repo "$REPO" --workflow "$WORKFLOW_NAME" --status completed --json databaseId,conclusion -L 20)"
          export RUN_JSON
          RUN_ID="$(python -c 'import json, os; runs=json.loads(os.environ["RUN_JSON"]); print(next((str(r["databaseId"]) for r in runs if r.get("conclusion")=="success"), ""))')"
          if [ -z "$RUN_ID" ]; then
            echo "Geen succesvolle bronrun gevonden voor $WORKFLOW_NAME"
            exit 1
          fi
          echo "Gebruik run id: $RUN_ID"
          ARTIFACTS_JSON="$(gh api "repos/$REPO/actions/runs/$RUN_ID/artifacts")"
          export ARTIFACTS_JSON ARTIFACT_PREFIX
          ARTIFACT_NAME="$(python -c 'import json, os; data=json.loads(os.environ["ARTIFACTS_JSON"]); prefix=os.environ["ARTIFACT_PREFIX"]; print(next((a["name"] for a in data.get("artifacts", []) if a.get("name","").startswith(prefix)), ""))')"
          if [ -z "$ARTIFACT_NAME" ]; then
            echo "Geen artifact gevonden met prefix $ARTIFACT_PREFIX"
            exit 1
          fi
          echo "Download artifact: $ARTIFACT_NAME"
          rm -rf "$TARGET_DIR/_restore"
          mkdir -p "$TARGET_DIR/_restore"
          gh run download "$RUN_ID" --repo "$REPO" -n "$ARTIFACT_NAME" -D "$TARGET_DIR/_restore"
          echo "Kopieer CSV-bestanden naar $TARGET_DIR"
          find "$TARGET_DIR/_restore" -name '*.csv' -type f -exec cp -f {} "$TARGET_DIR/" \;
          ls -la "$TARGET_DIR"

      - name: Run pipeline
        shell: bash
        run: |
          python -u scripts/automation/run_vinylofy_pipeline.py             --shop bobsvinyl

      - name: Upload workflow artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: bobsvinyl-stage2-${{ github.run_id }}
          path: |
            data/raw/bobsvinyl/**/*.csv
            data/raw/bobsvinyl/*.csv
            output/**/*.json
            output/**/*.csv
          if-no-files-found: warn
