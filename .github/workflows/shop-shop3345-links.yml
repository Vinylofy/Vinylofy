name: Shop - 3345 Discovery

on:
  workflow_dispatch:
  schedule:
    - cron: "40 2 * * *"

concurrency:
  group: vinylofy-shop3345
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      SUPABASE_STORAGE_BUCKET: ${{ vars.SUPABASE_STORAGE_BUCKET }}
      VINYLOFY_SCRAPER_CMD_SHOP3345: >-
        python -u scripts/scrapers/shop3345_automation.py
        --mode discovery
        --links-file data/raw/shop3345/3345_product_links.txt
        --csv-file data/raw/shop3345/3345_products.csv
        --state-file data/raw/shop3345/3345_detail_rotation_state.json
        --max-pages 200
        --source browse-all-music
        --source all

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Restore persisted 3345 state
        uses: actions/cache/restore@v4
        with:
          path: |
            data/raw/shop3345/3345_product_links.txt
            data/raw/shop3345/3345_products.csv
            data/raw/shop3345/3345_detail_rotation_state.json
          key: shop3345-state-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            shop3345-state-${{ github.ref_name }}-

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-scrapers.txt ]; then pip install -r requirements-scrapers.txt; fi
          pip install beautifulsoup4 requests pandas "psycopg[binary]" python-dotenv supabase playwright

      - name: Create runtime folders
        shell: bash
        run: |
          mkdir -p data/raw/shop3345
          mkdir -p output

      - name: Run discovery-only pipeline
        shell: bash
        run: |
          python -u scripts/automation/run_vinylofy_pipeline.py --shop shop3345 --skip-import --skip-upload

      - name: Save persisted 3345 state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            data/raw/shop3345/3345_product_links.txt
            data/raw/shop3345/3345_products.csv
            data/raw/shop3345/3345_detail_rotation_state.json
          key: shop3345-state-${{ github.ref_name }}-${{ github.run_id }}

      - name: Upload workflow artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: shop3345-discovery-${{ github.run_id }}
          path: |
            data/raw/shop3345/**/*.csv
            data/raw/shop3345/*.csv
            data/raw/shop3345/*.txt
            data/raw/shop3345/*.json
            output/**/*.json
            output/**/*.csv
          if-no-files-found: warn
