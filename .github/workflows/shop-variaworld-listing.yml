name: Shop - Variaworld Listing

on:
  workflow_dispatch:
  schedule:
    - cron: "10 2 * * *"

concurrency:
  group: vinylofy-variaworld
  cancel-in-progress: false

jobs:
  run:
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 45
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-scrapers.txt ]; then pip install -r requirements-scrapers.txt; fi
          pip install beautifulsoup4 requests pandas python-dotenv

      - name: Prepare runtime folders
        shell: bash
        run: |
          mkdir -p data/raw/variaworld
          mkdir -p output
          rm -f data/raw/variaworld/*.csv
          rm -f data/raw/variaworld/output/*.csv
          rm -f output/variaworld_*.csv
          rm -f output/variaworld_*.json

      - name: Run Variaworld listing
        shell: bash
        run: |
          set -euo pipefail
          python -u scripts/scrapers/variaworld.py --mode listing --output-dir data/raw/variaworld

      - name: Verify listing output
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import csv
          from pathlib import Path

          csv_path = Path("data/raw/variaworld/variaworld_products.csv")
          if not csv_path.exists():
              raise SystemExit(f"Ontbrekend outputbestand: {csv_path}")

          with csv_path.open("r", encoding="utf-8-sig", newline="") as handle:
              rows = list(csv.DictReader(handle))

          if not rows:
              raise SystemExit(f"Lege listing-output: {csv_path}")

          with_price = sum(1 for row in rows if (row.get("price") or "").strip())
          with_url = sum(1 for row in rows if (row.get("product_url") or "").strip())
          with_title = sum(1 for row in rows if (row.get("title") or "").strip())

          print(
              f"[VERIFY] rows={len(rows)} | with_price={with_price} | "
              f"with_url={with_url} | with_title={with_title}"
          )

          if with_url == 0 or with_title == 0:
              raise SystemExit("Listing-output mist essentiële velden (url/title)")
          PY

      - name: Upload workflow artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: variaworld-listing-${{ github.run_id }}
          path: |
            data/raw/variaworld/**/*.csv
            data/raw/variaworld/*.csv
            output/**/*.json
            output/**/*.csv
          if-no-files-found: warn
