name: Shop - Groovespin Listing

on:
  workflow_dispatch:
  schedule:
    - cron: "20 1 * * *"

concurrency:
  group: vinylofy-groovespin
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      SUPABASE_STORAGE_BUCKET: ${{ vars.SUPABASE_STORAGE_BUCKET }}
      VINYLOFY_SCRAPER_CMD_GROOVESPIN: "python -u scripts/scrapers/groovespin_automation.py --mode listing --output-dir data/raw/groovespin --max-pages 25"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-scrapers.txt ]; then pip install -r requirements-scrapers.txt; fi
          pip install beautifulsoup4 requests pandas lxml "psycopg[binary]" python-dotenv supabase playwright
          python -m playwright install --with-deps chromium

      - name: Create runtime folders
        shell: bash
        run: |
          mkdir -p data/raw/groovespin
          mkdir -p output

      - name: Run pipeline
        shell: bash
        run: |
          python -u scripts/automation/run_vinylofy_pipeline.py --shop groovespin --skip-import --skip-upload

      - name: Upload workflow artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: groovespin-listing-${{ github.run_id }}
          path: |
            data/raw/groovespin/**/*.csv
            data/raw/groovespin/*.csv
            output/**/*.json
            output/**/*.csv
          if-no-files-found: warn
