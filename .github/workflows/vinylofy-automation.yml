name: Vinylofy Automation

on:
  workflow_dispatch:
    inputs:
      shop:
        description: "Welke shop wil je draaien?"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - bobsvinyl
          - dgmoutlet
          - platomania
          - platenzaak
          - variaworld
          - groovespin
          - soundsvenlo
          - recordsonvinyl
          - shop3345
      skip_scrape:
        description: "Scraper overslaan en bestaand CSV gebruiken"
        required: true
        default: false
        type: boolean
      skip_upload:
        description: "Upload naar Supabase Storage overslaan"
        required: true
        default: false
        type: boolean
      dry_run_import:
        description: "Importer alleen valideren, geen DB writes"
        required: true
        default: false
        type: boolean

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      SUPABASE_STORAGE_BUCKET: ${{ vars.SUPABASE_STORAGE_BUCKET }}
      VINYLOFY_SCRAPER_CMD_BOBSVINYL: ${{ vars.VINYLOFY_SCRAPER_CMD_BOBSVINYL }}
      VINYLOFY_SCRAPER_CMD_DGMOUTLET: ${{ vars.VINYLOFY_SCRAPER_CMD_DGMOUTLET }}
      VINYLOFY_SCRAPER_CMD_PLATOMANIA: ${{ vars.VINYLOFY_SCRAPER_CMD_PLATOMANIA }}
      VINYLOFY_SCRAPER_CMD_PLATENZAAK: ${{ vars.VINYLOFY_SCRAPER_CMD_PLATENZAAK }}
      VINYLOFY_SCRAPER_CMD_VARIAWORLD: ${{ vars.VINYLOFY_SCRAPER_CMD_VARIAWORLD }}
      VINYLOFY_SCRAPER_CMD_GROOVESPIN: python -u scripts/scrapers/groovespin_automation.py --mode full --output-dir data/raw/groovespin --max-pages 30 --limit-ean 250
      VINYLOFY_SCRAPER_CMD_SOUNDSVENLO: python -u scripts/scrapers/soundsvenlo.py --mode both --limit-detail 250 --output-dir data/raw/soundsvenlo
      VINYLOFY_SCRAPER_CMD_RECORDSONVINYL: python -u scripts/scrapers/recordsonvinyl_automation.py --mode crawl --master-csv data/raw/recordsonvinyl/recordsonvinyl_master.csv --out data/raw/recordsonvinyl/recordsonvinyl_products.csv --max-pages 20 --limit-products 250 --workers 4
      VINYLOFY_SCRAPER_CMD_SHOP3345: python -u scripts/scrapers/shop3345_automation.py --mode both --links-file data/raw/shop3345/3345_product_links.txt --csv-file data/raw/shop3345/3345_products.csv --max-pages 20 --limit-details 250

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-scrapers.txt ]; then pip install -r requirements-scrapers.txt; fi
          pip install beautifulsoup4 requests pandas "psycopg[binary]" python-dotenv supabase playwright

      - name: Create runtime folders
        shell: bash
        run: |
          mkdir -p data/raw/bobsvinyl
          mkdir -p data/raw/dgmoutlet
          mkdir -p data/raw/platomania
          mkdir -p data/raw/platenzaak
          mkdir -p data/raw/variaworld
          mkdir -p data/raw/groovespin
          mkdir -p data/raw/soundsvenlo
          mkdir -p data/raw/recordsonvinyl
          mkdir -p data/raw/shop3345
          mkdir -p output

      - name: Run pipeline
        shell: bash
        run: |
          SHOP_INPUT="${{ github.event.inputs.shop }}"
          if [ -z "$SHOP_INPUT" ]; then SHOP_INPUT="all"; fi

          SKIP_SCRAPE=""
          if [ "${{ github.event.inputs.skip_scrape }}" = "true" ]; then
            SKIP_SCRAPE="--skip-scrape"
          fi

          SKIP_UPLOAD=""
          if [ "${{ github.event.inputs.skip_upload }}" = "true" ]; then
            SKIP_UPLOAD="--skip-upload"
          fi

          DRY_RUN_IMPORT=""
          if [ "${{ github.event.inputs.dry_run_import }}" = "true" ]; then
            DRY_RUN_IMPORT="--dry-run-import"
          fi

          python -u scripts/automation/run_vinylofy_pipeline.py \
            --shop "$SHOP_INPUT" \
            $SKIP_SCRAPE \
            $SKIP_UPLOAD \
            $DRY_RUN_IMPORT

      - name: Upload workflow artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: vinylofy-automation-${{ github.run_id }}
          path: |
            data/raw/**/*.csv
            output/**/*.json
            output/**/*.csv
          if-no-files-found: warn
