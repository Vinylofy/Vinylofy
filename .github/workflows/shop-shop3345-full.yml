name: Shop - 3345 Full

on:
  workflow_dispatch:
  schedule:
    - cron: "40 5 * * *"

concurrency:
  group: vinylofy-shop3345
  cancel-in-progress: false

jobs:

  gate:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.decide.outputs.should_run }}
    steps:
      - id: decide
        name: Decide whether enrich should run
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          DAY_INDEX=$(( $(date -u +%s) / 86400 ))
          if [ $(( DAY_INDEX % 2 )) -eq 0 ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

  run:
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      SUPABASE_STORAGE_BUCKET: ${{ vars.SUPABASE_STORAGE_BUCKET }}
      VINYLOFY_SCRAPER_CMD_SHOP3345: python -u scripts/scrapers/shop3345_automation.py --mode both --links-file data/raw/shop3345/3345_product_links.txt --csv-file data/raw/shop3345/3345_products.csv --max-pages 50 --limit-details 250
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-scrapers.txt ]; then pip install -r requirements-scrapers.txt; fi
          pip install beautifulsoup4 requests pandas "psycopg[binary]" python-dotenv supabase playwright

      - name: Create runtime folders
        shell: bash
        run: |
          mkdir -p data/raw/shop3345
          mkdir -p output

      - name: Run pipeline
        shell: bash
        run: |
          python -u scripts/automation/run_vinylofy_pipeline.py             --shop shop3345

      - name: Upload workflow artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: shop3345-full-${{ github.run_id }}
          path: |
            data/raw/shop3345/**/*.csv
            data/raw/shop3345/*.csv
            output/**/*.json
            output/**/*.csv
          if-no-files-found: warn
